<!doctype html>
<html>
    <head>
        <title>Itowns - Showcase</title>

        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <!-- both itowns paths for webpack and local build -->
        <script type="importmap">
            {
                "imports": {
                    "itowns": "../../dist/itowns.js",
                    "three": "https://unpkg.com/three@0.182.0/build/three.module.js",
                    "three/addons/": "https://unpkg.com/three@0.182.0/examples/jsm/",
                    "OrbitControls": "https://unpkg.com/three@0.182.0/examples/jsm/controls/OrbitControls.js"
                }
            }
        </script>
        <script>
            function loadCss(url) {
                const link = document.createElement("link");
                link.rel = "stylesheet";
                link.type = "text/css";
                link.href = url;
                document.head.appendChild(link);
            }

            const basePath = window.location.href.startsWith("about:srcdoc")
                ? "/examples"
                : "..";

            loadCss(`${basePath}/css/example.css`);
            loadCss(`${basePath}/css/widgets.css`);
            loadCss(`${basePath}/demo/css/demo.css`);
            loadCss(`${basePath}/css/LoadingScreen.css`);
        </script>
    </head>
    <body>
        <div id="demoUI">
            <div id="textContainer">
                <h1 id="sceneTitle"></h1>
                <p id="sceneDescription"></p>
            </div>
            <div id="navigationContainer">
                <div id="sceneDots"></div>
                <button id="resetScene">reset camera</button>
                <button id="hardResetScene">reset scene</button>
            </div>
        </div>
        <script type="module">
            import * as THREE from "three";
            import * as itowns from "itowns";
            import { SceneTransitionUtils, SceneRepository, Config } from "../../dist/demo.js";

            Config.basePath = window.location.href.startsWith("about:srcdoc")
                ? "/examples"
                : "..";

            const resetSceneButton = document.getElementById("resetScene");
            const hardResetSceneButton =
                document.getElementById("hardResetScene");

            SceneTransitionUtils.updateUIForScene(SceneRepository[0]);
            await SceneRepository[0].onCreate();
            await SceneRepository[0].onEnter?.();
            SceneRepository[0].getView().setVisible(true);
            const iTownsView = SceneRepository[0].getItownsView();
            await SceneTransitionUtils.moveCameraTo(
                iTownsView,
                SceneRepository[0].placement,
                0.1,
            );

            let currentIndex = 0;

            const SceneManager = {
                async goTo(index) {
                    if (
                        index === currentIndex ||
                        index < 0 ||
                        index >= SceneRepository.length
                    ) {
                        return;
                    }
                    const from = SceneRepository[currentIndex];
                    const to = SceneRepository[index];
                    currentIndex = index;
                    updateActiveDot();

                    toggleEnableButtons(false);
                    toggleEnableDots(false);
                    try {
                        await SceneTransitionUtils.transitionToScene(from, to);
                    } finally {
                        toggleEnableButtons(true);
                        toggleEnableDots(true);
                    }
                },
                async softReset() {
                    toggleEnableButtons(false);
                    toggleEnableDots(false);
                    try {
                        await SceneTransitionUtils.resetScene(
                            SceneRepository[currentIndex],
                        );
                    } finally {
                        toggleEnableButtons(true);
                        toggleEnableDots(true);
                    }
                },
                async hardReset() {
                    toggleEnableButtons(false);
                    toggleEnableDots(false);
                    try {
                        await SceneTransitionUtils.hardResetScene(
                            SceneRepository[currentIndex],
                        );
                    } finally {
                        toggleEnableButtons(true);
                        toggleEnableDots(true);
                    }
                },
            };

            // ---- Build the dots UI ----
            const dotsContainer = document.getElementById("sceneDots");

            const dots = SceneRepository.map((scene, index) => {
                const dot = document.createElement("div");
                dot.classList.add("scene-dot");
                dot.title = scene.title ?? `Scene ${index + 1}`;
                dot.addEventListener("click", () => {
                    SceneManager.goTo(index);
                });
                dotsContainer.appendChild(dot);
                return dot;
            });

            function toggleEnableButtons(enable) {
                resetSceneButton.style.pointerEvents = enable ? "auto" : "none";
                hardResetSceneButton.style.pointerEvents = enable
                    ? "auto"
                    : "none";
                resetSceneButton.disabled = !enable;
                hardResetSceneButton.disabled = !enable;
            }

            function toggleEnableDots(enable) {
                dots.forEach((dot) => {
                    dot.style.pointerEvents = enable ? "auto" : "none";
                    dot.style.opacity = enable ? "1.0" : "0.5";
                });
            }

            function updateActiveDot() {
                dots.forEach((dot, i) => {
                    if (i === currentIndex) {
                        dot.classList.add("active");
                    } else {
                        dot.classList.remove("active");
                    }
                });
            }

            updateActiveDot();
            resetSceneButton.onclick = async () => {
                await SceneManager.softReset();
            };
            hardResetSceneButton.onclick = async () => {
                await SceneManager.hardReset();
            };
        </script>
    </body>
</html>
